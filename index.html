  <!-- 🎨 Bootstrap Loader Styles (Safe & Instant) -->
  <style>
    #app-bootstrap-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
      font-family: 'Outfit', sans-serif;
    }

    #app-bootstrap-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-content {
      text-align: center;
      animation: loader-pulse 2s ease-in-out infinite;
    }

    .loader-logo {
      width: auto;
      height: 180px;
      max-width: 80vw;
      object-fit: contain;
      margin-bottom: 24px;
      filter: none;
    }

    .loader-text {
      color: #a494c9;
      font-size: 1.25rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Tektur', sans-serif;
      margin-top: 10px;
    }

    .loader-progress {
      width: 200px;
      height: 2px;
      background: rgba(124, 58, 237, 0.1);
      margin: 20px auto 0;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .loader-progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      height: 100%;
      background: #7c3aed;
      border-radius: 4px;
      animation: progress-slide 1.5s ease-in-out infinite;
    }

    @keyframes loader-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.02); opacity: 0.8; }
    }

    @keyframes progress-slide {
      0% { left: -40%; }
      100% { left: 100%; }
    }
  </style>
