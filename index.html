<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Tracker Arena | Peak Productivity & Study Tracking</title>
  <meta name="description" content="Master your focus with All Tracker Arena. The ultimate study tracker to log hours, track routines, and climb global leaderboards. Perfect for students and devs." />
  <meta name="keywords" content="All Tracker, All Tracker Arena, study tracker, productivity app, focus timer, coding routine, DSA tracker, leaderboard, PWA, Supabase" />
  <meta name="author" content="Ankit Pandey" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://alltracker.online" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://alltracker.online/" />
  <meta property="og:title" content="All Tracker Arena | Master Your Focus & Productivity" />
  <meta property="og:description" content="Log your progress, master your routines, and climb the global leaderboard. The high-performance engine for your daily growth." />
  <meta property="og:image" content="https://alltracker.online/icons/Logo.svg" />
  <meta property="og:site_name" content="All Tracker Arena" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://alltracker.online/" />
  <meta name="twitter:title" content="All Tracker Arena | Master Your Focus & Productivity" />
  <meta name="twitter:description" content="Log your progress, master your routines, and climb the global leaderboard. The high-performance engine for your daily growth." />
  <meta name="twitter:image" content="https://alltracker.online/icons/Logo.svg" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "All Tracker Arena",
    "url": "https://alltracker.online",
    "description": "The ultimate high-fidelity study and productivity tracker. Log hours, manage routines, and climb the World Stage arena leaderboard with global sync.",
    "applicationCategory": "ProductivityApplication",
    "operatingSystem": "All",
    "author": {
      "@type": "Person",
      "name": "Ankit Pandey"
    }
  }
  </script>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/Logo.svg" />
  <link rel="shortcut icon" href="/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Tektur:wght@400..900&display=swap"
    rel="stylesheet" />
  <meta name="theme-color" content="#0b0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>

<body class="antialiased selection:bg-indigo-500/30 selection:text-white">
  <header id="appHeader" class="app-header backdrop-blur-md">
    <div class="brand-group">
      <img src="/icons/Logo.svg" alt="All Tracker Arena: The High-Performance Study Dashboard" class="app-logo" title="All Tracker Arena">
      <h1 class="brand">ALL TRACKER <span>ARENA</span></h1>
    </div>
    <div class="header-actions">
      <button id="startTimerBtn" class="btn btn-primary">Start Timer</button>
      <div id="headerDesktopActions" class="header-desktop-actions" style="display: flex; gap: 8px;">
        <button id="userManualBtn" class="btn">User Manual</button>
        <button id="settingsBtn" class="btn">Settings</button>
      </div>
      <button id="headerMoreBtn" class="btn btn-ghost show-mobile" style="padding: 8px; border-radius: 8px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="1" />
          <circle cx="12" cy="5" r="1" />
          <circle cx="12" cy="19" r="1" />
        </svg>
      </button>
      <div id="headerRight">
        <button class="btn btn-primary glow-blue" id="authTriggerBtn"
          style="font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; padding: 6px 14px; display: flex; align-items: center; justify-content: center; gap: 6px; border-radius: 6px; height: 32px; background: #10b981; border: none; color: white;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
          <span class="btn-text">LOGIN</span>
        </button>
      </div>
    </div>
  </header>

  <main class="layout mx-auto">
    <nav class="tabs">
      <button class="nav-item active" data-target="dashboardPane">
        Dashboard
      </button>
      <button class="nav-item" data-target="routinePane">Routine</button>
      <button class="nav-item" data-target="tasksPane">Tasks</button>
      <button class="nav-item" data-target="intelligencePane">Maamu</button>
      <button class="nav-item" data-target="bookmarksPane">Bookmarks</button>
      <button id="excalidrawToggle" class="nav-item"
        style="margin-left: auto; display: flex; align-items: center; gap: 6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        Canvas
      </button>
    </nav>

    <div id="drawSection" style="display: none; height: 600px">
      <iframe src="https://excalidraw.com" width="100%" height="80%" style="border: 1px solid #ccc"
        frameborder="0"></iframe>
    </div>

    <section id="dashboardPane" class="view-pane active">
      <!-- Injected by dashboard.ui.ts -->
    </section>

    <!-- Intelligence Strategist Pane -->
    <section id="intelligencePane" class="view-pane">
      <!-- Injected by intelligence.ui.ts -->
    </section>

    <section id="routinePane" class="view-pane">
      <!-- Injected by routine.ui.ts -->
    </section>

    <section id="tasksPane" class="view-pane">
      <!-- Injected by tasks.ui.ts -->
    </section>

    <section id="bookmarksPane" class="view-pane">
      <!-- Injected by bookmarks.ui.ts -->
    </section>
  </main>

  <div id="modal-root"></div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
