<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Tracker | Neon Arena</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="shortcut icon" href="/logo.png" type="image/x-icon" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Tektur:wght@400..900&display=swap"
    rel="stylesheet" />
  <meta name="theme-color" content="#0b0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>

<body class="antialiased selection:bg-indigo-500/30 selection:text-white">
  <header id="appHeader" class="app-header backdrop-blur-md">
    <div class="brand-group">
      <img src="/logo.png" alt="AllTracker Arena Logo" class="app-logo">
      <div class="brand">ALL TRACKER <span>ARENA</span></div>
    </div>
    <div class="header-actions">
      <button id="startTimerBtn" class="btn btn-primary">Start Timer</button>
      <div id="headerDesktopActions" class="header-desktop-actions" style="display: flex; gap: 8px;">
        <button id="userManualBtn" class="btn">User Manual</button>
        <button id="settingsBtn" class="btn">Settings</button>
      </div>
      <button id="headerMoreBtn" class="btn btn-ghost show-mobile" style="padding: 8px; border-radius: 8px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
      <div id="headerRight">
        <button class="btn btn-primary glow-blue" id="authTriggerBtn" style="font-size: 0.65rem; font-weight: 800; letter-spacing: 1px; padding: 6px 14px; display: flex; align-items: center; justify-content: center; gap: 6px; border-radius: 6px; height: 32px; background: #10b981; border: none; color: white;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span class="btn-text">LOGIN</span>
        </button>
      </div>
    </div>
  </header>

  <main class="layout mx-auto">
    <nav class="tabs">
      <button class="nav-item active" data-target="dashboardPane">
        Dashboard
      </button>
      <button class="nav-item" data-target="routinePane">Routine</button>
      <button class="nav-item" data-target="tasksPane">Tasks</button>
      <button class="nav-item" data-target="intelligencePane">Maamu</button>
      <button class="nav-item" data-target="bookmarksPane">Bookmarks</button>
      <button id="excalidrawToggle" class="nav-item"
        style="margin-left: auto; display: flex; align-items: center; gap: 6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9" />
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
        </svg>
        Canvas
      </button>
    </nav>

    <div id="drawSection" style="display: none; height: 600px">
      <iframe src="https://excalidraw.com" width="100%" height="80%" style="border: 1px solid #ccc"
        frameborder="0"></iframe>
    </div>

    <section id="dashboardPane" class="view-pane active">
      <!-- Injected by dashboard.ui.ts -->
    </section>

    <!-- Intelligence Strategist Pane -->
    <section id="intelligencePane" class="view-pane">
      <!-- Injected by intelligence.ui.ts -->
    </section>

    <section id="routinePane" class="view-pane">
      <!-- Injected by routine.ui.ts -->
    </section>

    <section id="tasksPane" class="view-pane">
       <!-- Injected by tasks.ui.ts -->
    </section>

    <section id="bookmarksPane" class="view-pane">
      <!-- Injected by bookmarks.ui.ts -->
    </section>
  </main>

  <div id="modal-root"></div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
